name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # Postgres de TESTE efêmero — só para o harness de camada-DB (tests/test_repository_db.py).
    # Localhost; some ao fim do job. O TEST_DATABASE_URL abaixo destrava esses testes (sem ele,
    # a suíte de DB é pulada e o conftest stuba o banco). Ver tests/conftest.py.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sharpen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Compilar (checagem de sintaxe)
        run: python -m compileall app tools scripts

      # Suíte pura, exatamente como sempre (conftest stuba o banco; SEM TEST_DATABASE_URL).
      # Ignora o harness de DB aqui para não misturar os dois mundos numa só invocação.
      - name: Testes de fórmulas financeiras
        run: pytest -q --ignore=tests/test_repository_db.py

      # Harness de camada-DB numa invocação ISOLADA: só aqui o TEST_DATABASE_URL existe, então
      # só aqui os stubs somem e o repository/database reais tocam o Postgres de teste. Isolar
      # evita que o DATABASE_URL setado pelo módulo de DB contamine os testes com TestClient.
      - name: Harness de camada-DB (Postgres)
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sharpen_test
        run: pytest -q tests/test_repository_db.py

      - name: Auditoria casa × global
        run: python tools/audit_casas.py

      - name: Check de tokens de marca
        run: node scripts/tokens/check-tokens.mjs
